          <option value="6B">6B</option>
          <option value="7A">7A</option>
          <option value="7B">7B</option>
          <option value="8A">8A</option>
          <option value="8B">8B</option>

          </div>

        <!-- Jenis Izin & Jam Mata Kuliah (Grid) -->
        <!-- Jenis Izin -->
<div>

<!-- Jam Mata Kuliah -->
<div class="md:col-span-2">

      <input type="checkbox" name="jamMakul" value="Jam Ke-2"
      class="accent-green-600 w-4 h-4">

    <label class="flex items-center gap-2 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-xl px-3 py-3 cursor-pointer hover:border-green-500 hover:bg-green-50 dark:hover:bg-gray-600 transition-all">
      <input type="checkbox" name="jamMakul" value="Jam Ke-3"

        <!-- Input Keterangan/Alasan -->

  <script>
    // Logika Pengendali Dark Mode
const themeToggleBtn = document.getElementById('themeToggle');
const themeToggleSun = document.getElementById('themeToggleSun');
const themeToggleMoon = document.getElementById('themeToggleMoon');

function updateToggleIcons() {
  if (document.documentElement.classList.contains('dark')) {
    themeToggleSun.classList.remove('hidden');
    themeToggleMoon.classList.add('hidden');
  } else {
    themeToggleSun.classList.add('hidden');
    themeToggleMoon.classList.remove('hidden');
  }
}
updateToggleIcons(); // Jalankan saat pertama kali dimuat

themeToggleBtn.addEventListener('click', function() {
  document.documentElement.classList.toggle('dark');
  if (document.documentElement.classList.contains('dark')) {
    localStorage.setItem('theme', 'dark');
  } else {
    localStorage.setItem('theme', 'light');
  }
  updateToggleIcons();
});
    document.getElementById('izinForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const submitBtn = document.getElementById('submitBtn');
      const btnText = submitBtn.querySelector('span');
      const loadingIcon = document.getElementById('loadingIcon');
      const statusMessage = document.getElementById('statusMessage');
      
      // Mengubah status tombol
      submitBtn.disabled = true;
      anime({
  targets: '#submitBtn',
  scale: [
    { value: 0.95, duration: 120 },
    { value: 1, duration: 400 }
  ],
  easing: 'easeOutElastic(1, .6)'
});
      submitBtn.classList.replace('bg-green-600', 'bg-green-400');
      btnText.textContent = 'Memproses File & Mengirim...';
      loadingIcon.classList.remove('hidden');
      statusMessage.classList.add('hidden');

      try {
        const fileInput = document.getElementById('fileBukti');
        const file = fileInput.files[0];
        
        // Membaca file dan mengubahnya menjadi format Base64 agar bisa dikirim ke Google Script
        const reader = new FileReader();
        reader.onload = async function(e) {
          const fileData = e.target.result;
          const base64Data = fileData.split(',')[1]; // Mengambil kode base64-nya saja
          
          const selectedJam = Array.from(
  document.querySelectorAll('input[name="jamMakul"]:checked')
);

if (selectedJam.length === 0) {
  showStatus('error', 'Pilih minimal satu jam mata kuliah.');
  resetButton();
  return;
}
          const payload = {
            nama: document.getElementById('nama').value,
            kelas: document.getElementById('kelas').value,
            nohp: document.getElementById('nohp').value,
            jenisIzin: document.getElementById('jenisIzin').value,
            jamMakul: Array.from(document.querySelectorAll('input[name="jamMakul"]:checked'))
  .map(el => el.value)
  .join(', '),
            alasan: document.getElementById('alasan').value,
            fileName: file.name,
            mimeType: file.type,
            fileBase64: base64Data,
            status: "Menunggu Persetujuan" // Default status
          };

          console.log("Data siap dikirim, memproses...");
          
          // =====================================================================
          // PENTING: GANTI TULISAN DI BAWAH INI DENGAN URL WEB APP GOOGLE ANDA
          // =====================================================================
          const scriptURL = "https://script.google.com/macros/s/AKfycbzp5d3JxPVg0jq1UN6Y-Pc15kBte5_bUIL5oHpkevOLLTJAtWpDKGi0qQe1WKMuQnMV/exec";
          
          const response = await fetch(scriptURL, {
            method: "POST",
            body: JSON.stringify(payload)
          });
          
          const result = await response.json();
          
          if (result.status === "success") {
            showStatus('success', 'Berhasil! Permohonan izin Anda telah terkirim.');
            document.getElementById('izinForm').reset();
          } else {
            showStatus('error', 'Gagal: ' + result.message);
          }
          
          resetButton();
        };
        
        reader.readAsDataURL(file);

      } catch (error) {
        showStatus('error', 'Terjadi kesalahan sistem: ' + error.message);
        resetButton();
      }

      function resetButton() {
        submitBtn.disabled = false;
        submitBtn.classList.replace('bg-green-400', 'bg-green-600');
        btnText.textContent = 'Kirim Permohonan Izin';
        loadingIcon.classList.add('hidden');
      }

      function showStatus(type, message) { 
        statusMessage.textContent = message;
        statusMessage.classList.remove('hidden', 'bg-green-100', 'text-green-700', 'bg-red-100', 'text-red-700');
        if (type === 'success') {
          statusMessage.classList.add('bg-green-100', 'text-green-700');
        } else {
          statusMessage.classList.add('bg-red-100', 'text-red-700');
        }
        anime({
  targets: '#statusMessage',
  opacity: [0, 1],
  translateY: [-15, 0],
  duration: 700,
  easing: 'easeOutExpo'
});
      }
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/animejs/lib/anime.min.js"></script>
